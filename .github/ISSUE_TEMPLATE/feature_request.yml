name: Feature request
description: Suggest an idea or improvement for this project
title: "[FEATURE] - "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe your idea clearly and concisely.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Use case / motivation
      description: Who would benefit from this and how?
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context, mockups, or references.
    validations:
      required: false